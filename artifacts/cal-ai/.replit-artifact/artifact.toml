kind = "web"
previewPath = "/"
title = "Cal AI - Calorie Tracker"
version = "1.0.0"
id = "artifacts/cal-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23141

[services.development]
run = "pnpm --filter @workspace/cal-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cal-ai", "run", "build" ]
publicDir = "artifacts/cal-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23141"
BASE_PATH = "/"
