kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace/artifacts/api-server && mvn spring-boot:run -q"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && mvn package -DskipTests -q"]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && java -jar target/cal-ai-backend-1.0.0.jar"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
