server:
  port: 8080
  servlet:
    context-path: /api

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:calai-super-secret-key-for-jwt-tokens-minimum-32-chars-long}
    expiration: 86400000
  openai:
    api-key: ${OPENAI_API_KEY:}
    api-url: https://api.openai.com/v1
  upload:
    dir: ./uploads

logging:
  level:
    com.calai: DEBUG
    org.springframework.security: WARN
